name: ci

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: rustup default 1.96.0-x86_64-unknown-linux-gnu
      - run: rustup component add clippy
      - run: rustup component add rustfmt
      - run: cargo check --locked --workspace --verbose
      - run: cargo build --locked --workspace --verbose
      - run: cargo test --locked --workspace --verbose
      - run: cargo clippy --locked --workspace --verbose
      - run: cargo fmt --all --check

  api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: rustup default 1.96.0-x86_64-unknown-linux-gnu
      - run: cargo build --locked --package windy-wallpaper-api
      - run: cargo run --locked --package windy-wallpaper-api -- --once
      - uses: actions/upload-artifact@v7
        with:
          name: wind-field
          path: |
            wind_field.jpg
            wind_field.png
            wind_cache.*.png

  app:
    name: App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: gradle
      - run: rustup default 1.96.0-x86_64-unknown-linux-gnu
      - run: rustup target add aarch64-linux-android
      - run: rustup target add armv7-linux-androideabi
      - run: rustup target add x86_64-linux-android
      - run: cargo install cargo-ndk@4.1.2
      - run: ./gradlew app:assembleDebug
      - uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
