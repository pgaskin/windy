name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  app:
    name: App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: gradle
      - run: rustup default 1.96.0-x86_64-unknown-linux-gnu
      - run: rustup target add aarch64-linux-android
      - run: rustup target add armv7-linux-androideabi
      - run: rustup target add x86_64-linux-android
      - run: cargo install cargo-ndk@4.1.2
      - run: ./gradlew app:assembleRelease
      - uses: actions/upload-artifact@v7
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    needs:
      - app
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: app-release
      - name: Write keystore
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      - name: Sign APK
        run: $ANDROID_HOME/build-tools/36.0.0/apksigner sign --ks "$KEYSTORE_PATH" --ks-pass env:KEYSTORE_PASSWORD --in app-release-unsigned.apk --out app-release.apk
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      - name: Verify APK signature
        run: $ANDROID_HOME/build-tools/36.0.0/apksigner verify --print-certs app-release.apk
      - name: Create release
        uses: actions/github-script@v9
        id: create-release
        with:
          retries: 3
          result-encoding: string
          script: |
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.split('/').pop(),
              draft: true,
            })
            return release.data.id
      - name: Upload release asset
        uses: actions/github-script@v9
        with:
          retries: 3
          script: |
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ toJSON(steps.create-release.outputs.result) }},
              data: require('fs').readFileSync('app-release.apk'),
              name: 'WindyLiveWallpaper.apk',
            })
