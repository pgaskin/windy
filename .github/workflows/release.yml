name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    environment:
      name: release
      deployment: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - run: test "${{github.ref_name}}" == "v$(grep -FA5 'name = "windy-wallpaper-' Cargo.lock | grep -E '^version\s*=\s*".+"' | cut -d '"' -f2 | sort -u)" || { echo 'incorrect version in Cargo.lock'; exit 1; }
      - run: test "${{github.ref_name}}" == "v$(grep -E '^version\s*=\s*".+"' Cargo.toml | head -n1 | cut -d '"' -f2)" || { echo 'incorrect version in workspace Cargo.toml'; exit 1; }
      - run: test "${{github.ref_name}}" == "v$(find . -name Cargo.toml -not -path './target/*' | xargs grep -E 'windy-wallpaper-core = ' | grep -Eo 'version\s*=\s*".+"' | cut -d '"' -f2 | sort -u)" || { echo 'incorrect version in Cargo.toml'; exit 1; }

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: gradle
      - run: rustup default 1.96.0-x86_64-unknown-linux-gnu
      - run: rustup target add aarch64-linux-android
      - run: rustup target add armv7-linux-androideabi
      - run: rustup target add x86_64-linux-android
      - run: cargo install cargo-ndk@4.1.2
      - run: ./gradlew app:assembleRelease

      - name: Write keystore
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      - name: Sign APK
        run: $ANDROID_HOME/build-tools/36.0.0/apksigner sign --ks "$KEYSTORE_PATH" --ks-pass env:KEYSTORE_PASSWORD --in app/build/outputs/apk/release/app-release-unsigned.apk --out app-release.apk
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      - name: Verify APK signature
        run: $ANDROID_HOME/build-tools/36.0.0/apksigner verify --print-certs app-release.apk

      - name: Create release
        id: create-release
        uses: actions/github-script@v8
        with:
          retries: 3
          script: |
            const {data: {id: id}} = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace(/^refs\/tags\//, ''),
              target_commitish: context.sha,
              name: context.ref.replace(/^refs\/tags\//, ''),
              draft: true,
            })
            core.setOutput('id', id)
      - name: Upload release asset
        uses: actions/github-script@v9
        with:
          retries: 3
          script: |
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ toJSON(steps.create-release.outputs.id) }},
              data: require('fs').readFileSync('app-release.apk'),
              name: 'WindyLiveWallpaper.apk',
            })
