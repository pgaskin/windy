<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windy</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: #000;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>

<body>
    <canvas onclick="window.location.reload()"></canvas>
    <script type="importmap">
        {
            "imports": {
                "wgpu-matrix": "https://esm.sh/wgpu-matrix@3.3.0",
                "webgpu-utils": "https://esm.sh/webgpu-utils@1.9.5"
            }
        }
    </script>
    <script type="module">
        import { vec3, vec4, mat4 } from 'wgpu-matrix';
        import { makeShaderDataDefinitions, makeStructuredView } from 'webgpu-utils';

        async function wind_cache(filter = 1) {
            const res = await fetch(`https://windy.api.pgaskin.net/wind_cache.png?filter=${filter}`)
            const blob = await res.blob()
            const img = await createImageBitmap(blob, { colorSpaceConversion: 'none' })
            return img
        }
        
        const PARTICLES_COUNT = 2048

        const adapter = await navigator.gpu.requestAdapter()
        const device = await adapter.requestDevice()

        const canvas = document.querySelector('canvas')
        canvas.width = window.innerWidth
        canvas.height = window.innerHeight

        const context = canvas.getContext('webgpu')
        const presentationFormat = navigator.gpu.getPreferredCanvasFormat()

        context.configure({
            device,
            format: presentationFormat,
        })

        function clamp(n, min, max) {
            if (min !== undefined && n < min)
                return min
            if (max !== undefined && n > max)
                return max
            return n
        }

        function lngToEqui(lng) {
            return (180.0 + lng) / 360.0;
        }

        function latToEqui(lat) {
            return (90.0 + lat) / 180.0;
        }

        class WindField {
            constructor(device, img) {
                this.image = img;
                this.sampler = device.createSampler({
                    addressModeU: 'repeat',
                    addressModeV: 'repeat',
                    magFilter: 'linear',
                })
                this.texture = device.createTexture({
                    label: 'wind_cache texture',
                    format: 'rgba8unorm',
                    size: [this.image.width, this.image.height],
                    usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST | GPUTextureUsage.RENDER_ATTACHMENT,
                });
                device.queue.copyExternalImageToTexture(
                    { source: this.image, flipY: true },
                    { texture: this.texture },
                    { width: this.image.width, height: this.image.height },
                )
                this.region = vec4.create()
            }
            setWindowSize(windowSize) {
                this.setRegion(windowSize, this.width, this.height, this.longitude, this.latitude)
            }
            setSize(width, height) {
                this.setRegion(this.windowSize, width, height, this.longitude, this.latitude)
            }
            setPosition(longitude, latitude) {
                this.setRegion(this.windowSize, this.width, this.height, longitude, latitude)
            }
            setRegion(windowSize, width, height, longitude, latitude) {
                this.windowSize = windowSize
                this.width = width
                this.height = height
                this.longitude = longitude
                this.latitude = latitude
                const wndLngWidth = this.windowSize * (this.width / this.height)
                const wndLatHeight = this.windowSize;
                const left = clamp(this.longitude - wndLngWidth/2, -180, 180)
                const top = clamp(this.latitude - wndLatHeight/2, -90, 90)
                const right = clamp(left + wndLngWidth, -180, 180)
                const bottom = clamp(top + wndLatHeight, -90, 90)
                vec4.set(lngToEqui(left), latToEqui(top), lngToEqui(right)-lngToEqui(left), latToEqui(bottom)-latToEqui(top), this.region)
            }
        }

        const vectorField = new WindField(device, await wind_cache())

        // runs the particle system
        const particlesShader = `
            // note: this struct MUST have a size of a multiple of 16 or the array will be misaligned
            struct Particle {
                position: vec2f,
                life: f32,
                unused: f32,
            }

            struct Params {
                vectorFieldBounds: vec4f, // x,y,w,h
                scale: vec2f, // x,y >= 1.0

                count: u32,
                aspectRatio: f32, // height/width
                timeDelta: f32,
                timeAcc: f32,
                windSpeed: f32,
                particleLife: f32,
            }

            @group(0) @binding(0) var<uniform> params: Params;
            @group(0) @binding(1) var vectorFieldSampler: sampler;
            @group(0) @binding(2) var vectorField: texture_2d<f32>;
            @group(0) @binding(3) var<storage, read_write> particles: array<Particle>;

            @compute @workgroup_size(64) fn main(@builtin(global_invocation_id) invocation: vec3u) {
                let index = invocation.x;
                if (index >= params.count) {
                    return;
                }

                var particle = particles[index];
                particle.position += windSpeedDelta(particle.position) * params.windSpeed * params.timeDelta * .2;
                particle.life -= params.timeDelta / params.particleLife * .3;

                let seed = params.timeAcc;
                let r1 = rand(vec2f(f32(index) + seed, 1));
                let r2 = rand(vec2f(f32(index) + seed, 2));
                let r3 = rand(vec2f(f32(index) + seed, 3));

                var randomParticle: Particle;
                randomParticle.position = vec2f(r1, r2)*1.2 - 1;
                randomParticle.life = .2 + r3*.8;

                let isDead = particle.life < 0.0;
                particles[index].position = select(particle.position, randomParticle.position, isDead);
                particles[index].life = select(particle.life, randomParticle.life, isDead);
            }

            fn windSpeed(uv: vec2f) -> vec3f {
                let vectorFieldUv = equiToMercator(params.vectorFieldBounds.xy + uv*params.vectorFieldBounds.zw*params.scale);
                let vectorFieldSample = textureSampleLevel(vectorField, vectorFieldSampler, vectorFieldUv, 0);
                return vectorFieldSample.rgb;
            }

            fn windSpeedDelta(uv: vec2f) -> vec2f {
                return (windSpeed(uv).rg - 0.5) * vec2f(1.0, -1.0) * vec2f(params.aspectRatio, 1.0);
            }

            fn equiToMercator(uv: vec2f) -> vec2f {
                let pi = radians(180.0);
                return vec2(uv.x, atan(sinh((uv.y*2.0 - 1.0)*pi*0.5))/(pi*0.5)*0.5 + 0.5);
            }

            fn rand(co: vec2f) -> f32 {
                let a = 12.9898;
                let b = 78.233;
                let c = 43758.5453;
                let dt = dot(co.xy, vec2f(a,b));
                let sn = fract(dt / 3.14) * 3.14;
                return fract(sin(sn) * c)*2;
            }
        `

        const particlesModule = device.createShaderModule({
            label: 'particle system compute shader',
            code: particlesShader,
        })

        const particlesPipeline = device.createComputePipeline({
            label: `particle system pipeline`,
            layout: 'auto',
            compute: {
                module: particlesModule,
            },
        })

        const particlesBuffer = device.createBuffer({
            label: `particle data buffer`,
            size: 16 * PARTICLES_COUNT,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
        })
        device.queue.writeBuffer(particlesBuffer, 0, new Float32Array(PARTICLES_COUNT*4))

        const particlesShaderDefs = makeShaderDataDefinitions(particlesShader)
        const particlesParams = makeStructuredView(particlesShaderDefs.uniforms.params)

        const particlesParamsBuffer = device.createBuffer({
            size: particlesParams.arrayBuffer.byteLength,
            usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
        })
        const setParticlesParams = data => {
            particlesParams.set(data)
            device.queue.writeBuffer(particlesParamsBuffer, 0, particlesParams.arrayBuffer)
        }

        const particlesBindGroup = device.createBindGroup({
            layout: particlesPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: particlesParamsBuffer } },
                { binding: 1, resource: vectorField.sampler },
                { binding: 2, resource: vectorField.texture.createView() },
                { binding: 3, resource: { buffer: particlesBuffer } },
            ],
        })

        // takes a trail buffer as input, fades out the g component into a new buffer
        const trailShader = `
            struct Params {
                scale: vec2f, // x,y >= 1.0
                // TODO: transform (multiply v.position)

                fadeDecay: f32,
            }

            struct VertexOutput {
                @builtin(position) position: vec4f,
                @location(0) texcoord: vec2f,
            }

            @group(0) @binding(0) var<uniform> params : Params;
            @group(0) @binding(1) var trailSampler: sampler;
            @group(0) @binding(2) var trail: texture_2d<f32>;

            @vertex fn vs(@builtin(vertex_index) idx: u32) -> VertexOutput {
                let xy = array(
                    vec2f(-1, -1), // triangle 1: bottom-left
                    vec2f( 1, -1), // triangle 1: bottom-right
                    vec2f(-1,  1), // triangle 1: top-left
                    vec2f(-1,  1), // triangle 2: top-left
                    vec2f( 1, -1), // triangle 2: bottom-right
                    vec2f( 1,  1), // triangle 2: top-right
                )[idx];
                var v: VertexOutput;
                v.position = vec4f(xy * params.scale, 0.0, 1.0);
                v.texcoord = xy;
                return v;
            }

            @fragment fn fs(v: VertexOutput) -> @location(0) vec4f {
                var color = textureSample(trail, trailSampler, v.texcoord);
                color.g *= params.fadeDecay;
                return color;
            }
        `

        const trailModule = device.createShaderModule({
            label: 'trail shader',
            code: trailShader,
        })

        const trailShaderDefs = makeShaderDataDefinitions(trailShader)
        const trailParams = makeStructuredView(trailShaderDefs.uniforms.params)

        const trailParamsBuffer = device.createBuffer({
            size: trailParams.arrayBuffer.byteLength,
            usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
        })
        const setTrailParams = data => {
            trailParams.set(data)
            device.queue.writeBuffer(trailParamsBuffer, 0, trailParams.arrayBuffer)
        }

        const trailTextureDesc = {
            size: [canvas.width, canvas.height, 1],
            dimension: '2d',
            format: 'rgba16float',
            usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.RENDER_ATTACHMENT,
        }

        const trailPipeline = device.createRenderPipeline({
            label: 'trail pipeline',
            layout: 'auto',
            vertex: {
                module: trailModule,
            },
            fragment: {
                module: trailModule,
                targets: [{ format: trailTextureDesc.format }],
            },
        })

        const trailSampler = device.createSampler({
            addressModeU: 'clamp-to-edge',
            addressModeV: 'clamp-to-edge',
            magFilter: 'linear',
        })

        let trailPingPong = false
        let trailTexturePing = null
        let trailTexturePong = null
        let trailBindGroupPing = null
        let trailBindGroupPong = null

        // TODO: fix trails not drawing

        // takes the particle system buffer as input, draws particles into the trail buffer
        const particleShader = `
            struct Particle {
                position: vec2f,
                life: f32,
                unused: f32,
            }

            struct Params {
                // TODO: transform (multiply v.position)
                resolution: vec2f, // width,height

                particleSize: f32,
                particleOpacity: f32,
            }

            struct VertexOutput {
                @builtin(position) position: vec4f,
                @location(1) pointCoord: vec2f, // where within the point the fragment is [0, 1]
                @location(2) color: vec4f,
            }

            @group(0) @binding(0) var<uniform> params : Params;
            @group(0) @binding(1) var<storage, read> particles: array<Particle>;

            @vertex fn vs(@location(0) particle: u32, @builtin(vertex_index) idx: u32) -> VertexOutput {
                var v: VertexOutput;
                v.pointCoord = array(
                    vec2f(-1, -1), // triangle 1: bottom-left
                    vec2f( 1, -1), // triangle 1: bottom-right
                    vec2f(-1,  1), // triangle 1: top-left
                    vec2f(-1,  1), // triangle 2: top-left
                    vec2f( 1, -1), // triangle 2: bottom-right
                    vec2f( 1,  1), // triangle 2: top-right
                )[idx];
                v.position = vec4f(particles[particle].position + v.pointCoord*params.particleSize/params.resolution, 0.0, 1.0);
                v.color = vec4f(1.0);
                v.color.r = step(0.7, rand(vec2f(f32(particle)))); // 70% use slow color, rest use fast color
                v.color.g *= smoothstep(0.0, 0.05, 1.0 - particles[particle].life); // initial opacity for trail based on life
                v.color.g *= smoothstep(0.0, .25, particles[particle].life);
                return v;
            }

            @fragment fn fs(v: VertexOutput) -> @location(0) vec4f {
                var color = v.color;
                color.a = 1.-smoothstep(0.1, 1., v.pointCoord.x*v.pointCoord.x + v.pointCoord.y*v.pointCoord.y); // make the points round by fading out the edges
                color.a *= params.particleOpacity;
                return color;
            }

            fn rand(co: vec2f) -> f32 { // TODO: fixme: rand isn't really that random
                let a = 12.9898;
                let b = 78.233;
                let c = 43758.5453;
                let dt = dot(co.xy, vec2f(a,b));
                let sn = fract(dt / 3.14) * 3.14;
                return fract(sin(sn) * c)*2;
            }
        `

        const particleModule = device.createShaderModule({
            label: 'particle shader',
            code: particleShader,
        })

        const particleShaderDefs = makeShaderDataDefinitions(particleShader)
        const particleParams = makeStructuredView(particleShaderDefs.uniforms.params)

        const particleParamsBuffer = device.createBuffer({
            size: particleParams.arrayBuffer.byteLength,
            usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
        })
        const setParticleParams = data => {
            particleParams.set(data)
            device.queue.writeBuffer(particleParamsBuffer, 0, particleParams.arrayBuffer)
        }

        const particleVertex = new Uint32Array(PARTICLES_COUNT)
        for (let i = 0; i < PARTICLES_COUNT; i++) {
            particleVertex[i] = i;
        }
        const particleVertexBuffer = device.createBuffer({
            label: 'particle vertex buffer vertices',
            size: particleVertex.byteLength,
            usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST,
        })
        device.queue.writeBuffer(particleVertexBuffer, 0, particleVertex)

        const particlePipeline = device.createRenderPipeline({
            label: 'particle pipeline',
            layout: 'auto',
            vertex: {
                module: particleModule,
                buffers: [
                    {
                        arrayStride: 4,
                        stepMode: 'instance',
                        attributes: [
                            {
                                shaderLocation: 0,
                                offset: 0,
                                format: 'uint32',
                            },
                        ],
                    },
                ],
            },
            fragment: {
                module: particleModule,
                targets: [
                    {
                        format: trailTextureDesc.format,
                        blend: {
                            color: {
                                srcFactor: 'one',
                                dstFactor: 'one-minus-src-alpha',
                            },
                            alpha: {
                                srcFactor: 'one',
                                dstFactor: 'one-minus-src-alpha',
                            },
                        },
                    },
                ],
            },
        })

        const particleBindGroup = device.createBindGroup({
            layout: particlePipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: particleParamsBuffer } },
                { binding: 1, resource: { buffer: particlesBuffer } },
            ],
        })

        // draws the wallpaper (background plus streamlines)
        const backgroundShader = `
            struct Params {
                scale: vec2f, // x,y >= 1.0
                // TODO: transform (multiply v.position)
                vectorFieldBounds: vec4f, // x,y,w,h

                colorBackground1: vec3f, // r,g,b
                colorBackground2: vec3f, // r,g,b
                colorParticleSlow: vec4f, // r,g,b,a
                colorParticleFast: vec4f, // r,g,b,a
            }

            struct VertexOutput {
                @builtin(position) position: vec4f,
                @location(0) texcoord: vec2f,
            }

            @group(0) @binding(0) var<uniform> params : Params;
            @group(0) @binding(1) var vectorFieldSampler: sampler;
            @group(0) @binding(2) var vectorField: texture_2d<f32>;
            @group(0) @binding(3) var particleSampler: sampler;
            @group(0) @binding(4) var particleTexture: texture_2d<f32>;

            @vertex fn vs(@builtin(vertex_index) idx: u32) -> VertexOutput {
                let xy = array(
                    vec2f(-1, -1), // triangle 1: bottom-left
                    vec2f( 1, -1), // triangle 1: bottom-right
                    vec2f(-1,  1), // triangle 1: top-left
                    vec2f(-1,  1), // triangle 2: top-left
                    vec2f( 1, -1), // triangle 2: bottom-right
                    vec2f( 1,  1), // triangle 2: top-right
                )[idx];
                var v: VertexOutput;
                v.position = vec4f(xy * params.scale, 0.0, 1.0);
                v.texcoord = xy / 2. + .5; // xy[-1,1] -> xy[0,1]
                return v;
            }

            @fragment fn fs(v: VertexOutput) -> @location(0) vec4f {
                let color = vec4(mix(params.colorBackground1, params.colorBackground2, windSpeedNorm(v.texcoord)), 1.0);
                let particle = textureSample(particleTexture, particleSampler, v.texcoord);
                let particleColor = mix(params.colorParticleSlow, params.colorParticleFast, particle.r); // particle.r = 1 if fast, 0 if slow
                return mix(color, particleColor, particleColor.a*particle.a*particle.g); // a*g = alpha*life
            }

            fn windSpeed(uv: vec2f) -> vec3f {
                let vectorFieldUv = equiToMercator(params.vectorFieldBounds.xy + uv*params.vectorFieldBounds.zw*params.scale);
                let vectorFieldSample = textureSampleLevel(vectorField, vectorFieldSampler, vectorFieldUv, 0);
                return vectorFieldSample.rgb;
            }

            fn windSpeedNorm(uv: vec2f) -> f32 {
                return windSpeed(uv).b;
            }

            fn equiToMercator(uv: vec2f) -> vec2f {
                let pi = radians(180.0);
                return vec2(uv.x, atan(sinh((uv.y*2.0 - 1.0)*pi*0.5))/(pi*0.5)*0.5 + 0.5);
            }
        `

        const backgroundModule = device.createShaderModule({
            label: 'background shader',
            code: backgroundShader,
        })

        const backgroundShaderDefs = makeShaderDataDefinitions(backgroundShader)
        const backgroundParams = makeStructuredView(backgroundShaderDefs.uniforms.params)

        const backgroundParamsBuffer = device.createBuffer({
            size: backgroundParams.arrayBuffer.byteLength,
            usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
        })
        const setBackgroundParams = data => {
            backgroundParams.set(data)
            device.queue.writeBuffer(backgroundParamsBuffer, 0, backgroundParams.arrayBuffer)
        }

        const backgroundPipeline = device.createRenderPipeline({
            label: 'background pipeline',
            layout: 'auto',
            vertex: {
                module: backgroundModule,
            },
            fragment: {
                module: backgroundModule,
                targets: [{ format: presentationFormat }],
            },
        })

        let backgroundBindGroupPing
        let backgroundBindGroupPong

        const backgroundRenderPassDescriptor = {
            label: 'background render pass',
            colorAttachments: [
                {
                    clearValue: [0, 0, 0, 1],
                    loadOp: 'clear',
                    storeOp: 'store',
                },
            ],
        }

        let first = true
        let timeAcc = 0
        function render(millis) {
            const timeDelta = 1/18

            // TODO: rest of render logic

            if (first) { // TODO: handle resize too
                timeAcc = 0

                vectorField.setRegion(75, canvas.width, canvas.height, -75.7, 45.4)

                setParticlesParams({
                    vectorFieldBounds: vectorField.region,
                    scale: [1.0, 1.0],
                    count: PARTICLES_COUNT,
                    aspectRatio: canvas.height / canvas.width,
                    timeDelta: timeDelta,
                    timeAcc: timeAcc,
                    windSpeed: 0.1,
                    particleLife: 8.0,
                })

                setParticleParams({
                    resolution: [canvas.width, canvas.height],
                    particleSize: 3.0,
                    particleOpacity: 0.6,
                })

                setTrailParams({
                    scale: [1.0, 1.0],
                    fadeDecay: 0.9965,
                })

                setBackgroundParams({
                    scale: [1.0, 1.0],
                    vectorFieldBounds: vectorField.region,
                    colorBackground1: [0.102, 0.035, 0.035],
                    colorBackground2: [0.271, 0.090, 0.090],
                    colorParticleSlow: [0.576, 0.192, 0.192, 0.25],
                    colorParticleFast: [0.792, 0.376, 0.376, 0.30],
                })

                trailTextureDesc.size[0] = canvas.width
                trailTextureDesc.size[1] = canvas.height

                trailTexturePing = device.createTexture(trailTextureDesc)
                trailTexturePong = device.createTexture(trailTextureDesc)

                // TODO: split up bind groups

                trailBindGroupPing = device.createBindGroup({
                    layout: trailPipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: { buffer: trailParamsBuffer } },
                        { binding: 1, resource: trailSampler },
                        { binding: 2, resource: trailTexturePing.createView() },
                    ],
                })

                trailBindGroupPong = device.createBindGroup({
                    layout: trailPipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: { buffer: trailParamsBuffer } },
                        { binding: 1, resource: trailSampler },
                        { binding: 2, resource: trailTexturePong.createView() },
                    ],
                })

                backgroundBindGroupPing = device.createBindGroup({
                    layout: backgroundPipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: { buffer: backgroundParamsBuffer } },
                        { binding: 1, resource: vectorField.sampler },
                        { binding: 2, resource: vectorField.texture.createView() },
                        { binding: 3, resource: trailSampler },
                        { binding: 4, resource: trailTexturePing.createView() },
                    ],
                })

                backgroundBindGroupPong = device.createBindGroup({
                    layout: backgroundPipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: { buffer: backgroundParamsBuffer } },
                        { binding: 1, resource: vectorField.sampler },
                        { binding: 2, resource: vectorField.texture.createView() },
                        { binding: 3, resource: trailSampler },
                        { binding: 4, resource: trailTexturePong.createView() },
                    ],
                })
            }

            setParticlesParams({
                timeDelta: timeDelta,
                timeAcc: timeAcc,
            })

            const encoder = device.createCommandEncoder()

            const particlesPass = encoder.beginComputePass({
                label: 'particle system render pass',
            })
            particlesPass.setPipeline(particlesPipeline)
            particlesPass.setBindGroup(0, particlesBindGroup)
            particlesPass.dispatchWorkgroups(Math.ceil(PARTICLES_COUNT / 64))
            particlesPass.end()

            const trailPass = encoder.beginRenderPass({
                label: 'trail render pass',
                colorAttachments: [
                    {
                        view: (trailPingPong ? trailTexturePing : trailTexturePong).createView(),
                        clearValue: [0, 0, 0, 1],
                        loadOp: first ? 'clear' : 'load',
                        storeOp: 'store',
                    },
                ],
            })
            trailPass.setPipeline(trailPipeline)
            trailPass.setBindGroup(0, trailPingPong ? trailBindGroupPong : trailBindGroupPing)
            trailPass.draw(6)
            trailPass.end()

            const particlePass = encoder.beginRenderPass({
                label: 'particle render pass',
                colorAttachments: [
                    {
                        view: (trailPingPong ? trailTexturePong : trailTexturePing).createView(),
                        loadOp: 'load',
                        storeOp: 'store',
                    },
                ],
            })
            particlePass.setPipeline(particlePipeline)
            particlePass.setVertexBuffer(0, particleVertexBuffer)
            particlePass.setBindGroup(0, particleBindGroup)
            particlePass.draw(6, PARTICLES_COUNT)
            particlePass.end()

            const backgroundPass = encoder.beginRenderPass({
                label: 'background render pass',
                colorAttachments: [
                    {
                        view: context.getCurrentTexture().createView(),
                        clearValue: [0, 0, 0, 1],
                        loadOp: 'clear',
                        storeOp: 'store',
                    },
                ],
            })
            backgroundPass.setPipeline(backgroundPipeline)
            backgroundPass.setBindGroup(0, trailPingPong ? backgroundBindGroupPong : backgroundBindGroupPing)
            backgroundPass.draw(6)
            backgroundPass.end()

            device.queue.submit([encoder.finish()])

            timeAcc += timeDelta
            trailPingPong = !trailPingPong
            first = false
            requestAnimationFrame(render)
        }
        
        render()
    </script>
</body>

</html>
